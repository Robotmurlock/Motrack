name: sort
params:
  filter:
    name: bot-sort
    params:
      override_std_weight_position: 0.05
  initialization_threshold: 3
  matcher:
    name: move
    params:
      distance_name: l1
      match_threshold: 0.2
      motion_lambda: 5
  remember_threshold: 30

  # MoveSORT-GMC extension
  cmc:
    name: gmc-from-file
    params:
      dirpath: /media/home/GMC_files/DanceTrack

requires_image: true