name: byte
params:
  filter:
    name: bot-sort
    params:
      override_std_weight_position: 0.05
  initialization_threshold: 3
  new_tracklet_detection_threshold: 0.7
  remember_threshold: 60
  detection_threshold: 0.6
  high_matcher:
    name: compose
    params:
      matchers:
        - name: iou
          params:
           match_threshold: 0.15
        - name: reid
          params: {}
      weights:
        - 1.0
        - 1.5
  low_matcher:
    name: compose
    params:
      matchers:
        - name: iou
          params:
           match_threshold: 0.5
      weights:
        - 1.0
  new_matcher:
    name: iou
    params:
      match_threshold: 0.15

  # ReID extension
  reid:
    name: fastreid-onnx
    params:
      model_path: /media/home/reid/SBS.onnx
      height: 384
      width: 128
      cache_path: /tmp/reid_sbs50  # Cache inference for faster future runs (should be deleted if the detector changed)
      batch_inference: false